<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📚 Book Tracker</h1>

  <div class="stats">
    <span>Total: <b id="total">0</b></span>
    <span class="green">Read: <b id="read">0</b></span>
    <span class="blue">Reading: <b id="reading">0</b></span>
    <span class="yellow">Want: <b id="want">0</b></span>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search by title or author...">

    <select id="filter">
      <option value="all">All</option>
      <option value="Read">Read</option>
      <option value="Reading">Reading</option>
      <option value="Want">Want to Read</option>
    </select>

    <button onclick="openForm()">+ Add Book</button>
  </div>
</header>

<main id="bookGrid"></main>

<p id="emptyState">No books added yet 📭</p>

<!-- Modal -->
<div id="formModal" class="modal">
  <form id="bookForm">
    <h2>Add Book</h2>

    <input type="text" id="title" placeholder="Title" required>
    <input type="text" id="author" placeholder="Author" required>
    <input type="text" id="genre" placeholder="Genre">
    <input type="number" id="pages" placeholder="Total Pages">

    <select id="status">
      <option value="Read">Read</option>
      <option value="Reading">Reading</option>
      <option value="Want">Want to Read</option>
    </select>

    <button type="submit">Save</button>
    <button type="button" onclick="closeForm()">Cancel</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
